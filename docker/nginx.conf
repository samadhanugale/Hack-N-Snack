user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    server {
        listen 4200;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # API: same-origin reverse proxy to the backend (context-path /api).
        # Serving the UI and the API from the same origin means the published
        # web port can be changed freely with no CORS or hard-coded-URL issues.
        # Origin is cleared so the backend treats these as same-origin requests.
        location /api/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin            "";
            proxy_read_timeout 120s;
        }

        # Angular SPA: route everything that isn't a real file back to index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Long-cache fingerprinted build assets
        location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
    }
}
