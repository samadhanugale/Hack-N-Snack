server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: never
    include-stacktrace: never

spring:
  application:
    name: smart-quiz-ai-hub
  # Java 21 virtual threads — scales concurrent bulk uploads & AI-generation endpoints
  # without a large platform-thread pool (Story 3.1).
  threads:
    virtual:
      enabled: true
  # DB_PASSWORD is required — no default. Set it in .env or as an environment variable.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smart_quiz_hub}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

  ai:
    openai:
      # Groq (OpenAI-compatible) — free tier, no credit card. Get a key at https://console.groq.com/keys
      # Set OPENAI_API_KEY to your Groq key (starts with gsk_). Spring AI calls {base-url}/v1/chat/completions.
      # For real OpenAI instead: OPENAI_BASE_URL=https://api.openai.com, OPENAI_API_KEY=sk-..., OPENAI_MODEL=gpt-4o-mini
      base-url: ${OPENAI_BASE_URL:https://api.groq.com/openai}
      api-key: ${OPENAI_API_KEY}
      chat:
        # Path is overridable: OpenAI/Groq use /v1/chat/completions (default);
        # GitHub Models uses /chat/completions (set OPENAI_COMPLETIONS_PATH=/chat/completions).
        completions-path: ${OPENAI_COMPLETIONS_PATH:/v1/chat/completions}
        options:
          model: ${OPENAI_MODEL:llama-3.3-70b-versatile}
          temperature: 0.7
          max-tokens: 1000
      embedding:
        embeddings-path: ${OPENAI_EMBEDDINGS_PATH:/v1/embeddings}
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

# ─────────────────────────────────────────────────────────────
#  Level 2 — AI duplicate detection
#  threshold           : block / replace when similarity >= this (0.0–1.0). 0.30 = 30%.
#  embeddings-enabled  : use Spring AI embeddings for similarity. On any failure
#                        (e.g. no OPENAI_API_KEY) it transparently falls back to a
#                        deterministic lexical scorer, so the feature works offline.
#  embedding-floor     : embedding cosine of unrelated English text is well above 0,
#                        so cosine in [floor, 1] is rescaled to [0, 1] for intuitive %.
# ─────────────────────────────────────────────────────────────
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  ai:
    similarity:
      threshold: ${AI_SIMILARITY_THRESHOLD:0.30}
      embeddings-enabled: ${AI_EMBEDDINGS_ENABLED:true}
      embedding-floor: ${AI_EMBEDDING_FLOOR:0.50}

# JWT_SECRET is required — no default. Generate one with: openssl rand -base64 48
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}


springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.accenture.smartquiz: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/smart-quiz-hub.log
